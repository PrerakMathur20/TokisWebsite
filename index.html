<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Tokis — A performance-first, token-native UI design system for React. Zero runtime styling, accessible by default, built for SaaS and enterprise." />
    <title>Tokis — Performance-First UI Library</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script>
      // GitHub Pages SPA: restore redirected path
      (function () {
        var redirect = sessionStorage.getItem('spa_redirect');
        if (redirect) {
          sessionStorage.removeItem('spa_redirect');
          var base = window.location.pathname.split('/').slice(0, 2).join('/');
          window.history.replaceState(null, '', base + '/' + redirect);
        }
      })();
    </script>
    <script>
      // Prevent FOUC — apply theme before first paint
      (function () {
        try {
          var stored = localStorage.getItem('tokis-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
    <!-- GoatCounter: visitor analytics (owner-only dashboard at https://YOUR_CODE.goatcounter.com) -->
    <!-- Replace YOUR_CODE with your GoatCounter site code after signing up at https://www.goatcounter.com -->
<script data-goatcounter="https://prerak.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
